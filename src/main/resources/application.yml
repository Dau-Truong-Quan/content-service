spring:
  application:
    name: content-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        # Store all Instant as plain TIMESTAMP normalised to UTC.
        # Avoids `timestamp with time zone` which trips H2 in some dialect modes.
        timezone:
          default_storage: NORMALIZE
  cache:
    type: caffeine
    cache-names:
      - plants
      - plants-list
      - journal
      - journal-list
      - gallery
      - gallery-list
      - offerings
      - offerings-list
      - stats
    caffeine:
      spec: maximumSize=200,expireAfterWrite=10m

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches

app:
  jwt:
    # Override in prod via JWT_SECRET env var. Must be at least 32 bytes for HS256.
    secret: ${JWT_SECRET:dev-secret-change-me-please-change-me-please-change-me}
    issuer: identity-service
    dev-print-token: true
  cors:
    allowed-origins: http://localhost:4200, http://localhost:8080
