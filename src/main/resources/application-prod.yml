spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/content}
    username: ${DATABASE_USER:content}
    password: ${DATABASE_PASSWORD:content}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    dev-print-token: false
