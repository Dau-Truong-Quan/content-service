spring:
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:h2:file:./data/content-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.web: INFO
